version = 1
status = "ready_for_implementation"

[project]
name = "tsify-wasm-boundary"
description = "Replace manual TS type sync with tsify-next + serde-wasm-bindgen for auto-generated typed WASM boundary"
worktree_base = ".worktrees"

# ── Task 1: Add tsify-next + serde-wasm-bindgen deps ─────────────

[[tasks]]
id = "task-001"
title = "Add tsify-next and serde-wasm-bindgen to rustsim and rustcam"
acceptance = """
- crates/rustsim/Cargo.toml has tsify-next = { version = \"0.5\", features = [\"js\"] } and serde-wasm-bindgen = \"0.6\"
- crates/rustcam/Cargo.toml has the same deps
- `cargo check -p rustsim -p rustcam` passes
- `wasm-pack build crates/rustsim --target web` succeeds
"""
deps = []
status = "complete"

# ── Task 2: Derive Tsify on snapshot types (GraphSnapshot, etc.) ──

[[tasks]]
id = "task-002"
title = "Add Tsify derives to GraphSnapshot, BlockSnapshot, ChannelSnapshot, Value, PortDef"
acceptance = """
- GraphSnapshot, BlockSnapshot, BlockId, ChannelId, Channel, PortDef, Value all derive Tsify + Serialize
- #[tsify(into_wasm_abi)] on output types, #[tsify(from_wasm_abi)] on input types
- wasm-pack build generates correct TS interfaces in pkg/rustsim.d.ts for these types
- No manual TS definitions needed for these types in types.ts
"""
deps = ["task-001"]
status = "complete"

# ── Task 3: Convert snapshot WASM exports from String to typed ────

[[tasks]]
id = "task-003"
title = "Replace JSON string returns with typed Tsify structs in dataflow_snapshot and dataflow_block_types"
acceptance = """
- dataflow_snapshot() returns GraphSnapshot directly (not String)
- dataflow_block_types() returns Vec<BlockTypeInfo> directly (not String)
- TS callers get typed objects without JSON.parse()
- graph.ts DataflowManager.snapshot() and blockTypes() updated to remove JSON.parse
- `cd www-dataflow && npx tsc --noEmit` passes
"""
deps = ["task-002"]
status = "pending"

# ── Task 4: Convert block config types to Tsify (replace ts-rs) ──

[[tasks]]
id = "task-004"
title = "Replace ts-rs derives with Tsify on all block config structs"
acceptance = """
- All 23 config structs (AdcConfig, PwmConfig, FunctionConfig, etc.) derive Tsify instead of ts-rs::TS
- ts-rs dependency removed from rustsim Cargo.toml
- crates/rustsim/bindings/ directory removed (no longer needed)
- www-dataflow/src/dataflow/generated/ directory removed
- Config types appear in pkg/rustsim.d.ts auto-generated by wasm-pack
- `cargo check -p rustsim` passes
"""
deps = ["task-001"]
status = "complete"

# ── Task 5: Convert remaining WASM exports to typed args ──────────

[[tasks]]
id = "task-005"
title = "Replace JSON string parameters with typed Tsify structs in add_block and update_block"
acceptance = """
- dataflow_add_block takes block_type: String + config: JsValue (deserialized via serde_wasm_bindgen)
- Or: takes a typed AddBlockRequest { block_type, config } via Tsify
- dataflow_update_block similarly typed
- graph.ts callers updated to pass objects instead of JSON.stringify
- `cd www-dataflow && npx tsc --noEmit` passes
- `cargo test -p rustsim` passes
"""
deps = ["task-003", "task-004"]
status = "pending"

# ── Task 6: Delete manual types.ts definitions ────────────────────

[[tasks]]
id = "task-006"
title = "Remove manually-maintained TS types that are now auto-generated"
acceptance = """
- www-dataflow/src/dataflow/types.ts removed or reduced to UI-only types (NodePosition)
- All imports of GraphSnapshot, BlockSnapshot, Value, PortDef, ChannelSnapshot come from pkg/rustsim.js
- `cd www-dataflow && npx tsc --noEmit` passes
- `cd www-dataflow && npm test` passes
"""
deps = ["task-005"]
status = "pending"

# ── Task 7: Verify full build + CI ───────────────────────────────

[[tasks]]
id = "task-007"
title = "Verify make all passes with typed WASM boundary"
acceptance = """
- `make lint` passes
- `make test` passes (coverage >= 92%)
- `make wasm` builds both crates
- `make ts` passes all three frontends
- `make require-safe` passes
- No JSON.parse/JSON.stringify in dataflow graph.ts for snapshot/blockTypes
"""
deps = ["task-006"]
status = "pending"
