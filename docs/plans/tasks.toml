version = 1
status = "ready_for_implementation"

[project]
name = "schema-driven-forms"
description = "Replace hardcoded inspector UI with JSON Schema-driven form generation from Rust config types"
worktree_base = ".worktrees"

# ── Task 1: Add schemars to rustsim + derive JsonSchema on configs ──

[[tasks]]
id = "task-001"
title = "Add schemars dep and derive JsonSchema on all block config structs"
acceptance = """
- schemars = \"1\" added to crates/rustsim/Cargo.toml
- All block config structs (ConstantConfig, FunctionConfig, AdcConfig, etc.) derive JsonSchema
- `cargo check -p rustsim` passes
"""
deps = []
status = "pending"

# ── Task 2: WASM export for block config schema ──────────────────

[[tasks]]
id = "task-002"
title = "Add dataflow_block_schema(block_type) WASM export returning JSON Schema"
acceptance = """
- New function: dataflow_block_schema(block_type: &str) -> String (returns JSON Schema)
- Uses schemars::schema_for! to generate schema for each config type
- Returns empty object {} for unknown block types
- `cargo test -p rustsim -- block_schema` has tests for constant, gain, adc_source
- Schema includes type, properties, required fields, enum values, defaults
"""
deps = ["task-001"]
status = "pending"

# ── Task 3: Vanilla TS schema form renderer ──────────────────────

[[tasks]]
id = "task-003"
title = "Create renderSchemaForm() that generates DOM from JSON Schema"
acceptance = """
- New file: www-dataflow/src/dataflow/schema-form.ts
- Function: renderSchemaForm(container, schema, data, onChange) -> void
- Handles JSON Schema types: string, number, integer, boolean
- Handles enum (oneOf/enum) as <select>
- Handles nested objects (renders sub-sections)
- Uses existing Tailwind classes matching current inspector style
- All DOM via document.createElement (no innerHTML)
- `cd www-dataflow && npx tsc --noEmit` passes
- Unit tests in schema-form.test.ts using jsdom
"""
deps = []
status = "pending"

# ── Task 4: Wire schema form into inspector ──────────────────────

[[tasks]]
id = "task-004"
title = "Replace hardcoded inspector in index.ts with schema-driven form"
acceptance = """
- updateBlockInfo() calls dataflow_block_schema() to get schema
- Passes schema + current config to renderSchemaForm()
- Apply button reads form data and calls mgr.updateBlock()
- Delete button unchanged
- All block types render correct inspector forms
- `cd www-dataflow && npx tsc --noEmit` passes
"""
deps = ["task-002", "task-003"]
status = "pending"

# ── Task 5: Schema defaults replace palette DEFAULT_CONFIGS ──────

[[tasks]]
id = "task-005"
title = "Generate palette default configs from JSON Schema default values"
acceptance = """
- palette.ts reads schema defaults via dataflow_block_schema()
- DEFAULT_CONFIGS map removed or reduced to overrides-only
- New blocks added to palette automatically get defaults from schema
- `cd www-dataflow && npx tsc --noEmit` passes
- `cd www-dataflow && npm test` passes
"""
deps = ["task-004"]
status = "pending"

# ── Task 6: Verify full build ────────────────────────────────────

[[tasks]]
id = "task-006"
title = "Verify make all passes with schema-driven forms"
acceptance = """
- `make lint` passes
- `make wasm` builds
- `make ts` passes all frontends
- Manual: add block, inspector shows schema-generated form, Apply works
"""
deps = ["task-005"]
status = "pending"
