version = 1
status = "ready_for_implementation"

[project]
name = "block-auto-registry"
description = "Auto-register blocks via inventory crate — implement trait + add crate = block appears in palette"
worktree_base = ".worktrees"

# ── Task 1: Add inventory crate + BlockRegistration type ──────────

[[tasks]]
id = "task-001"
title = "Define BlockRegistration struct and inventory collection in module-traits"
acceptance = """
- module-traits/src/registry.rs defines BlockRegistration { block_type, display_name, category, create_from_json: fn(&str) -> Result<Box<dyn Module>, String> }
- inventory::collect!(BlockRegistration) declared
- `cargo check -p module-traits` passes
- No existing block code changes yet
"""
deps = []
status = "pending"

# ── Task 2: Add register_block! macro ─────────────────────────────

[[tasks]]
id = "task-002"
title = "Create register_block! macro that submits BlockRegistration to inventory"
acceptance = """
- Macro in module-traits: register_block!(block_type, display_name, category, |config_json| { parse + construct })
- Expands to inventory::submit!(BlockRegistration { ... })
- `cargo check -p module-traits` passes
"""
deps = ["task-001"]
status = "pending"

# ── Task 3: Register all 23 built-in blocks via inventory ─────────

[[tasks]]
id = "task-003"
title = "Replace hard-coded create_block match with inventory iteration"
acceptance = """
- Each block file (constant.rs, function.rs, embedded.rs, etc.) calls register_block! at module level
- create_block() iterates inventory::iter::<BlockRegistration> instead of match
- available_block_types() iterates inventory::iter::<BlockRegistration> instead of hardcoded vec
- All 23 block types still appear in palette
- `cargo test -p rustsim -- create_block` passes (all existing tests)
- `cargo test -p rustsim` passes (full suite)
"""
deps = ["task-002"]
status = "pending"

# ── Task 4: Verify WASM build + frontend ──────────────────────────

[[tasks]]
id = "task-004"
title = "Verify wasm-pack build and frontend palette shows all blocks"
acceptance = """
- `wasm-pack build crates/rustsim --target web` succeeds
- Frontend palette shows all 23 block types
- Blocks can be added, connected, ticked
- `make lint` passes
- `cargo test -p rustsim` all pass
"""
deps = ["task-003"]
status = "pending"

# ── Task 5: Document how to add a new block ───────────────────────

[[tasks]]
id = "task-005"
title = "Add CONTRIBUTING.md section on adding new blocks"
acceptance = """
- docs/CONTRIBUTING.md or CLAUDE.md has section explaining:
  1. Create struct implementing Module + Tick
  2. Call register_block! macro
  3. Block auto-appears in palette
- Example code snippet included
"""
deps = ["task-004"]
status = "pending"
