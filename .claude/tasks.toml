  - Kind-specific params (Slider min/max/step, Gauge range, etc.)
  - Channel bindings: direction (Input/Output) + topic name
- Widget rendering:
  - Toggle: clickable switch, sends 0.0/1.0 on topic
  - Slider: range input, sends current value on topic
  - Gauge: arc or bar showing current value from topic
  - Label: displays topic value as text
  - Button: sends 1.0 pulse on click
  - Indicator: colored dot (green >0.5, gray <=0.5)
