# ============================================================================
# Phase 5: Integration and polish
# ============================================================================

[[tasks]]
id = "task-012"
title = "Firmware upload with chunked OTA protocol"
acceptance = """
- Replace firmware.rs stub with full implementation:
  - File picker for .bin firmware files
  - File size and CRC32 display after selection
  - Upload button triggers OTA sequence:
    1. FwBegin(size, crc32) request
    2. FwChunk(offset, data) requests in 512-byte chunks
    3. FwFinish request after all chunks sent
  - Progress bar showing bytes sent / total
  - Status messages: "Preparing", "Uploading (45%)", "Verifying", "Complete"
  - Error handling: retry failed chunks, abort on FwError
  - "Mark Booted" button after successful upload (FwMarkBooted request)
- All CBOR message types already implemented in messages.rs
- trunk build --release succeeds
"""
deps = ["task-002"]
status = "complete"

