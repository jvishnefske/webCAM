# Phase 7: End-to-end integration test
# ============================================================================

[[tasks]]
id = "task-007"
title = "Add end-to-end G-code integration test across the three patterns"
acceptance = """
- New `crates/rustcam/tests/surface_3d_integration.rs`:
  - Loads a small, version-controlled test STL (e.g. a 10x10 pyramid
    written inline as a binary STL byte literal; no new binary assets
    checked in).
  - For each `Pattern` variant and each `ToolType` in {EndMill,
    BallEnd}, runs `Surface3dStrategy::generate_surface` and then the
    existing gcode emitter, asserting:
    - Resulting G-code is non-empty.
    - All `G1` Z values are >= the pyramid apex Z (no gouging).
    - Spiral emits exactly one `G0` to safe_z at start and one at end.
    - One-way emits `2 * row_count` rapids (approximate match).
    - Zig-zag emits exactly 2 rapids (start and end).
- Runs as part of `make verify`.
- `cargo test -p rustcam --test surface_3d_integration` passes.
- `cargo clippy -p rustcam --all-targets -- -D warnings` clean.
"""
