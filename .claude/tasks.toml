    Perpendicular, Parallel, Equal-length
  - Constraint list with remove buttons
  - DOF status display (Fully/Under/Over-Constrained)
- "Use Sketch in CAM" button: exports shapes as SVG string, switches to CAM mode
- trunk build --release succeeds
"""
deps = ["task-002", "task-008"]
status = "complete"

# ============================================================================
# Phase 4: Panel mode
# ============================================================================

[[tasks]]
id = "task-011"
title = "Panel editor with widgets and HIL live-sync"
acceptance = """
- New src/components/panel/mod.rs with sub-components:
- Widget types: Toggle, Slider (min/max/step), Gauge (min/max), Label, Button, Indicator
- Panel model: name, Vec<Widget> with id, kind, label, position, size, channel bindings
- Widget workspace:
  - Drag to position widgets on a grid
  - Click to select, show selection highlight
  - Delete selected widget
- Widget palette: click to add widget type to workspace
- Property inspector (selected widget):
