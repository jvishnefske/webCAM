# ============================================================================

[[tasks]]
id = "task-008"
title = "CAM mode — file upload, config, G-code generation"
acceptance = """
- Add rustcam as dependency in Cargo.toml (path = "../../crates/rustcam")
- New src/components/cam/mod.rs with sub-components:
- File upload: drag-drop zone + file picker for STL and SVG files
  - Reads file bytes via web-sys FileReader
  - Detects file type from extension
- Machine profile selector: CNC Mill / Laser Cutter (from rustcam::available_profiles)
- Strategy picker: Contour, Pocket, Slice, Zigzag (CNC) / Cut, Engrave (Laser)
- Tool configuration: type (End Mill/Ball/Face), diameter, corner radius, step-over
- CNC params: cut depth, step-down, feed rate, plunge rate, spindle speed, safe Z
- Laser params: power, feed rate, passes, air assist toggle
- Generate button: calls rustcam process_stl/process_svg with config JSON
- G-code output display: scrollable text area with line count
- Copy to clipboard button, Download .gcode button
- Error display for invalid configs or processing failures
- trunk build --release succeeds
"""
deps = ["task-002"]
status = "complete"

