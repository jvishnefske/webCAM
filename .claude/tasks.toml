version = 1
status = "implementation_complete"

[project]
name = "surface-3d-milling"
description = """
Add a true 3D surface milling strategy to rustcam: projects the tool shape
(flat cylinder for EndMill, sphere for BallEnd) from the +Z direction onto a
triangle mesh, then emits G-code in one of three patterns (zig-zag, one-way,
rectangular offset spiral). Replaces the existing pointwise-height-only
ZigzagSurfaceStrategy, which gouges the surface for flat end mills because
the tool center Z is not lifted to account for the disc footprint.

Input: user-uploaded STL via the existing parser. User-controlled knobs:
tool type (EndMill | BallEnd), tool diameter, stepover. Pattern selected by
dropdown in the CAM panel.
"""
worktree_base = ".worktrees"

# ============================================================================
# Phase 1: Tool-shape projection (pure functions, crate-local)
# ============================================================================

[[tasks]]
id = "task-001"
title = "Implement disc-sampled tool-shape projection onto the mesh"
# status was bumped to complete after TDD cycle: 8 new req-001 tests
# pass, all prior slicer tests still green, cargo clippy clean.
acceptance = """
- In crates/rustcam/src/slicer.rs add two pure functions:
  - `pub fn project_flat_tool(mesh: &Mesh, x: f64, y: f64, radius: f64) -> Option<f64>`
    Samples `mesh_height_at` over a polar grid covering the disc of radius
    `radius` centred at `(x, y)` (center sample + 16 samples at `r` + 8
    samples at `r/2`). Returns the maximum Z found, or None if no sample
    lies over the mesh. Represents the lowest legal tool-center Z for a
    flat cylinder end mill.
  - `pub fn project_ball_tool(mesh: &Mesh, x: f64, y: f64, radius: f64) -> Option<f64>`
    Same disc grid. For each sample at distance `d` from the disc centre,
    contribute `mesh_height_at(sx, sy) + sqrt(radius^2 - d^2)` to the max.
    Returns tool-center Z such that the sphere sits tangent to the highest
    point it can reach within the disc footprint.
- Both functions reuse the existing `mesh_height_at` without modifying it.
- Disc sampling density lives in a `const DISC_SAMPLES` so it can be tuned
  without touching call sites.
- Unit tests in `slicer.rs` (minimum 8):
  - Flat projection on a single horizontal triangle at z=5.0 returns 5.0 at
    the centre, at the perimeter, and outside radius returns None.
  - Flat projection on a ridge (two triangles meeting at higher z=7.0 along
    x=0) returns 7.0 when queried with (x=0.4, y=0) and radius=0.6 even
    though `mesh_height_at(0.4, 0)` is lower than 7.0.
  - Ball projection on a flat horizontal triangle at z=5.0 returns
    `5.0 + radius` at the centre.
  - Ball projection over a ridge returns a value higher than the flat
    projection at the same point (sphere + lift > flat disc max).
  - Projection returns None when the whole disc lies off the mesh.
  - Zero-radius flat projection collapses to pointwise `mesh_height_at`.
  - Negative tool radius returns None (guard). Zero is a valid degenerate
    case, not an error.
- `cargo test -p rustcam slicer::tests` all pass.
- `cargo clippy -p rustcam --all-targets -- -D warnings` clean.
"""
deps = []
status = "pending"

# ============================================================================
# Phase 2: Pattern enum + SurfaceParams extension
# ============================================================================

[[tasks]]
id = "task-002"
title = "Add Pattern enum and extend SurfaceParams with default ZigZag"
# Deviation from literal spec: instead of renaming new() to 4-arg and
# forcing callers to switch to new_with_defaults(), kept new() as the
# 3-arg default-pattern constructor and added new_with_pattern() as the
# 4-arg opt-in. Same API surface, zero churn at call sites.
acceptance = """
- In crates/rustcam/src/toolpath.rs:
  - Add `pub enum Pattern { ZigZag, OneWay, Spiral }` with `#[derive(Debug,
    Clone, Copy, PartialEq, Default)]` where `ZigZag` is the default.
  - Add `pattern: Pattern` field to `SurfaceParams`.
  - Keep `SurfaceParams::new(mesh, cut_params, scan_direction)` for
    backwards compatibility; it fills `Pattern::default()`.
  - Add `SurfaceParams::new_with_pattern(mesh, cut_params, scan_direction,
    pattern)` for explicit pattern selection.
  - Update the `From<(&Mesh, &CutParams)>` impl to set `pattern:
    Pattern::default()`.
- `Pattern` is reachable as `rustcam::toolpath::Pattern`.
- Unit tests in `toolpath.rs`:
  - `Pattern::default() == Pattern::ZigZag`.
  - `SurfaceParams::new` yields a struct whose `pattern` is `ZigZag`.
  - Constructing with each of the three variants round-trips via equality.
- `cargo test -p rustcam` passes (existing ZigzagSurfaceStrategy tests
  continue to work because they hit the default pattern).
- `cargo clippy -p rustcam --all-targets -- -D warnings` clean.
"""
deps = []
status = "complete"

# ============================================================================
# Phase 3: Strategy rename + tool-shape wiring
# ============================================================================

[[tasks]]
id = "task-003"
title = "Rename ZigzagSurfaceStrategy to Surface3dStrategy and wire tool projection"
acceptance = """
- In crates/rustcam/src/toolpath.rs rename `ZigzagSurfaceStrategy` to
  `Surface3dStrategy`. Keep a `pub use Surface3dStrategy as
  ZigzagSurfaceStrategy;` shim so downstream code (lib.rs re-exports,
  wasm_api.rs, www/src/cam.ts bindings, existing tests) still resolves.
- Inside `Surface3dStrategy::sample_point`, dispatch on the tool type:
  - `ToolType::EndMill` or `ToolType::FaceMill { .. }` → call
    `slicer::project_flat_tool(mesh, x, y, tool_radius)`.
  - `ToolType::BallEnd` → call `slicer::project_ball_tool(mesh, x, y,
    tool_radius)`. The existing normal-offset path is removed; disc
    sampling replaces it.
- `generate_surface` still honours `scan_direction` and returns the
  zig-zag path when `params.pattern == Pattern::ZigZag`. Dispatch to the
  one-way and spiral helpers (stubbed `unimplemented!()` returning an
  empty `Vec<Toolpath>` is acceptable here; filled in by task-004 and
  task-005).
- Unit tests added or updated (minimum 4 new):
  - A peak mesh (pyramid) produces a path whose maximum Z equals the
    pyramid apex Z + (0 for flat, radius for ball), confirming the tool
    rides over the peak without gouging.
  - With `ToolType::EndMill` + nonzero radius, the path Z at the peak is
    strictly greater than `mesh_height_at(apex_x, apex_y) - epsilon`
    would have produced. (Regression guard against pointwise sampling.)
  - Switching `ToolType::BallEnd` lifts the same path by exactly the
    tool radius on a horizontal plateau.
  - `pub use ZigzagSurfaceStrategy` still resolves (compile-only test).
- `cargo test -p rustcam` passes including the existing
  `test_surface_*` suite (which must remain green under the renamed
  strategy via the shim).
- `cargo clippy -p rustcam --all-targets -- -D warnings` clean.
"""
deps = ["task-001", "task-002"]
status = "complete"

# ============================================================================
# Phase 4: One-way pattern
# ============================================================================

[[tasks]]
id = "task-004"
title = "Implement one-way scan pattern"
acceptance = """
- Add `fn generate_one_way(params: &SurfaceParams) -> Vec<Toolpath>` as a
  private method on `Surface3dStrategy`.
- Path shape per scan row:
  1. Rapid to (row_start_x, row_start_y, safe_z).
  2. Plunge to sampled surface Z at row start.
  3. Cut forward through all samples in the row.
  4. Rapid up to safe_z and over to the next row start — never cut
     backwards.
- All rows are traversed in the same scan direction (no alternation, in
  contrast to ZigZag).
- Called from `generate_surface` when `params.pattern == Pattern::OneWay`.
- Unit tests (minimum 3):
  - For a mesh with rows R0, R1, R2, the emitted Toolpaths contain at
    least `rows * 2` rapid moves (one at the end of each row + one at
    the start of the next), whereas the ZigZag path has 2 rapids total
    (first plunge and final retract).
  - Every in-row cut segment has dx>=0 for `ScanDirection::X` (strictly
    forward; no reverse cuts).
  - First and last emitted toolpaths both include a rapid to safe_z.
- `cargo test -p rustcam` passes.
- `cargo clippy -p rustcam --all-targets -- -D warnings` clean.
"""
deps = ["task-003"]
status = "complete"

# ============================================================================
# Phase 5: Rectangular offset spiral pattern
# ============================================================================

[[tasks]]
id = "task-005"
title = "Implement rectangular offset spiral scan pattern"
acceptance = """
- Add `fn generate_spiral(params: &SurfaceParams) -> Vec<Toolpath>` as a
  private method on `Surface3dStrategy`.
- Spiral construction:
  - Start at the outer rectangle of the mesh XY bounding box.
  - Traverse its four edges with `step_over` sample spacing along each
    edge, sampling via the same tool-shape projection as the other
    patterns.
  - Offset the rectangle inward by `step_over` and repeat until
    width_remaining <= step_over or height_remaining <= step_over.
  - All moves are cutting moves at the sampled Z; exactly one rapid
    (initial plunge) and one retract (final lift) are emitted.
- Called from `generate_surface` when `params.pattern == Pattern::Spiral`.
- Unit tests (minimum 3):
  - On a 20x20 mesh with step_over=5.0, the spiral contains at least
    2 full loops (outer ring + one inner ring) before terminating.
  - Consecutive spiral points monotonically decrease in distance to the
    bounding box centre (within a tolerance of step_over).
  - Only one initial rapid and one final retract are emitted for the
    whole strategy.
- `cargo test -p rustcam` passes.
- `cargo clippy -p rustcam --all-targets -- -D warnings` clean.
"""
deps = ["task-003"]
status = "complete"

