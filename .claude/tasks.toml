version = 1
status = "ready_for_implementation"

[project]
name = "leptos-dataflow-editor-v2"
description = "Refactor Leptos DAG editor to match design spec: GraphState signals, HTML node components, separate Edge/Port/Node, proper pan/zoom layers"
worktree_base = ".worktrees"

# ============================================================================
# Phase 1: GraphState — reactive wrapper with fine-grained signals
# ============================================================================

[[tasks]]
id = "task-001"
title = "Extract GraphState with RwSignal-based reactive wrapper"
acceptance = """
- New hil/combined-frontend/src/graph_state.rs (NOT wasm32-gated, testable on host):
  - GraphState struct wrapping GraphEngine with fine-grained signals:
    - blocks: RwSignal<Vec<BlockSnapshot>> (derived from engine on mutation)
    - channels: RwSignal<Vec<Channel>> (derived from engine on mutation)
    - positions: RwSignal<HashMap<u32, (f64, f64)>>
    - selected_block: RwSignal<Option<u32>>
    - selected_edge: RwSignal<Option<u32>>
    - tick_count: RwSignal<u64>
    - topics: RwSignal<BTreeMap<String, f64>>
  - Mutation methods that update signals:
    - add_block(block_type, config, x, y) -> Option<u32>
    - remove_block(id)
    - update_config(id, key, value)
    - connect(from_block, from_port, to_block, to_port) -> Option<u32>
    - disconnect(channel_id)
    - tick() -> Result<(), String>
    - reset()
    - inject_topic(topic, value)
    - read_topic(topic) -> Option<f64>
  - Each mutation calls engine method THEN updates relevant signals
  - Provided via Leptos context (provide_context<GraphState>)
- Remove the thread_local ENGINE pattern from editor.rs — GraphState replaces it
- 10+ tests (pure logic, no Leptos signals in tests — test the engine delegation):
  - add_block returns id, remove_block removes
  - connect/disconnect work
  - tick increments tick_count
  - inject/read_topic round-trip
  - reset clears state
- cargo test -p combined-frontend
- cargo clippy --target wasm32-unknown-unknown -p combined-frontend -- -D warnings
"""
deps = []
status = "pending"

# ============================================================================
# Phase 2: Component decomposition — Node, Edge, Port as separate components
# ============================================================================

[[tasks]]
id = "task-002"
title = "Create Node component with HTML div rendering and drag"
acceptance = """
- New hil/combined-frontend/src/components/dag/node.rs (wasm32-gated):
  - #[component] fn Node(block_id: u32) -> impl IntoView
  - Reads GraphState from Leptos context
  - Renders as HTML <div> (NOT SVG <g>) with CSS transform for positioning
  - Structure: <div class="df-node"> with header, type label, input ports, output ports
  - Port circles rendered as small <div> elements positioned absolutely
  - Selection: click sets selected_block on GraphState
  - Drag: pointerdown starts drag (3px threshold), pointermove updates position,
    pointerup finalizes. Uses GraphState.positions signal.
  - Output value labels update reactively via tick_count subscription
  - Node height dynamic based on max(input_count, output_count) * PORT_SPACING
  - CSS classes: df-node, df-node.selected, df-node-header, df-node-type
- Register in dag/mod.rs
- trunk build --release succeeds
"""
deps = ["task-001"]
status = "pending"

[[tasks]]
id = "task-003"
title = "Create Edge component with SVG Bezier path"
acceptance = """
- New hil/combined-frontend/src/components/dag/edge.rs (wasm32-gated):
  - #[component] fn Edge(channel_id: u32) -> impl IntoView
  - Reads GraphState from context
  - Renders SVG <path> with cubic Bezier curve between source output port and dest input port
  - Path recomputes reactively when either endpoint block moves (positions signal)
  - Bezier control points: cpX = max(dx * 0.5, min(|dy|, 50))
  - Edge selection: click on path sets selected_edge, highlights (dashed, brighter)
  - Fat invisible hit-area path (stroke-width 12) behind visible path for easier clicking
  - CSS classes: df-edge, df-edge.selected, df-edge-hit
- Register in dag/mod.rs
- trunk build --release succeeds
"""
deps = ["task-001"]
status = "pending"

[[tasks]]
id = "task-004"
title = "Create Port component with wire drag interaction"
acceptance = """
- New hil/combined-frontend/src/components/dag/port.rs (wasm32-gated):
  - #[component] fn Port(block_id: u32, index: usize, side: &'static str, name: String) -> impl IntoView
  - Renders as absolutely-positioned <div> circle (12x12, border-radius 50%)
  - Port color by type (float=blue, bytes=orange, text=green, etc.)
  - Label text next to port (left for inputs, right for outputs)
  - Wire drag state machine:
    - pointerdown on output port starts wire drag
    - Provides WireDragState signal via context: { from_block, from_port, cursor_x, cursor_y }
    - Editor renders dashed SVG path following cursor during drag
    - pointerup on input port completes connection via GraphState.connect()
    - pointerup elsewhere cancels
    - Ports highlight on hover when compatible with active wire drag
  - Output ports show live value label (subscribes to tick_count)
- Register in dag/mod.rs
- trunk build --release succeeds
"""
deps = ["task-002", "task-003"]
status = "pending"

# ============================================================================
# Phase 3: Editor workspace with layers
# ============================================================================

[[tasks]]
id = "task-005"
title = "Refactor Editor with separate grid/edge/node layers and <For> rendering"
acceptance = """
- Rewrite hil/combined-frontend/src/components/dag/editor.rs:
  - Uses GraphState from context (no thread_local ENGINE)
  - Three stacked layers (absolute positioned):
    1. df-grid: CSS background grid (20px, adjusts with pan/zoom)
    2. df-edge-layer: SVG element containing <For> over channels → Edge components
    3. df-node-layer: HTML div containing <For> over block_ids → Node components
  - Pan: shift+pointerdown or middle-button drag on workspace
  - Zoom: wheel with focal point (zoom toward cursor)
  - Double-click: show palette at click position
  - Delete/Backspace: remove selected block or edge
  - Wire drag preview path rendered in edge layer (dashed, follows cursor)
  - <For> uses key function for efficient updates (block_id for nodes, channel_id for edges)
  - All sidebar sections remain (project, blocks, inspector, transport, export, HIL, monitor)
- CSS: df-workspace uses position:relative, layers use position:absolute inset:0
  with appropriate z-index (grid=0, edges=1, nodes=2)
- trunk build --release succeeds
"""
deps = ["task-004"]
status = "pending"

# ============================================================================
# Phase 4: Matching the TypeScript visual design
# ============================================================================

[[tasks]]
id = "task-006"
title = "Style nodes as HTML divs matching TypeScript node-view design"
acceptance = """
- Update style.css for HTML-div node rendering:
  - .df-node: absolute position, bg #1a1d27, border 1px #2a2d3a, rounded 6px,
    min-width 140px, cursor grab, user-select none
  - .df-node.selected: border 2px #4f8cff, box-shadow 0 0 12px rgba(79,140,255,0.25)
  - .df-node:active: cursor grabbing
  - .df-node-header: font 12px/semibold, color #e0e0e8, padding 10px 10px 2px 10px,
    text-overflow ellipsis, overflow hidden, white-space nowrap
  - .df-node-type: font 10px/monospace, color #8888a0, padding 0 10px 4px 10px
  - .df-port: position absolute, width 12px, height 12px, border-radius 50%,
    cursor crosshair, z-index 5
  - .df-port-label: font 10px/monospace, color #8888a0, position absolute, white-space nowrap
  - .df-port.input: left -6px, background #4f8cff
  - .df-port.output: right -6px, background #4f8cff
  - .df-port:hover: width 16px, height 16px, filter brightness(1.3)
  - .df-output-value: font 10px/monospace, color #55ff88, position absolute
- Port spacing: PORT_OFFSET_Y = 30px from top, PORT_SPACING = 20px between ports
- Node height = 40px + max(inputs, outputs) * 20px
- Edge path: stroke based on output port type color, stroke-width 2/3/4 (normal/selected/hover)
- Edge Bezier: M x1,y1 C x1+cpX,y1 x2-cpX,y2 x2,y2 where cpX = max(dx*0.5, min(|dy|, 50))
- Edge hover: brightness(1.3), edge selected: dashed "6 3", brightness(1.5)
- All dimensions and colors match the TypeScript editor screenshot
- trunk build --release succeeds
"""
deps = ["task-005"]
status = "pending"

# ============================================================================
# Phase 5: Tick loop and output display
# ============================================================================

[[tasks]]
id = "task-007"
title = "Implement tick loop with output values on ports and plot component"
acceptance = """
- Transport controls use GraphState.tick():
  - Play: requestAnimationFrame loop (60Hz) or gloo_timers Interval (configurable dt)
  - Pause: stop loop
  - Step: single tick
  - Reset: GraphState.reset()
  - Live mode: tick on inject_topic (from task-011 SimMode)
- Output value display on ports:
  - Output port label shows formatted value (Float: 2 decimal, Text: truncated 12 chars,
    Series: "[length]")
  - Updates reactively by subscribing to tick_count signal
  - Value label positioned right of output port circle
- Plot component: canvas sparkline for Series-typed output ports
  - 200-sample scrolling buffer
  - Auto-scaling Y axis
  - Updates on tick_count change
- Monitor panel: shows all pubsub topics and values from GraphState.topics signal
- 5+ tests:
  - GraphState.tick() increments tick_count
  - After tick, topics signal has published values
  - Reset clears tick_count and topics
- trunk build --release succeeds
"""
deps = ["task-006"]
status = "pending"

# ============================================================================
# Phase 6: Storage, sidebar, state machine editor, HIL
# ============================================================================

[[tasks]]
id = "task-008"
title = "Wire storage, sidebar, state machine editor, and HIL into new editor"
acceptance = """
- All existing components integrated with GraphState:
  - ProjectSidebar: save/load uses GraphState snapshot/restore
  - Auto-save: Effect watches GraphState mutation, debounces 2s save
  - BlockPalette: uses GraphState.add_block()
  - ConfigPanel: uses GraphState.update_config()
  - StateMachineEditor: uses GraphState.update_config() for FSM blocks
  - TransportBar: uses GraphState.tick()/reset(), SimMode
  - MonitorPanel: reads GraphState.topics signal
  - ExportPanel: reads GraphState snapshot for codegen
  - BoardManager: reads block list from GraphState
  - HilClient: deploy sends GraphState DAG to MCU
- Mode switching (CAM/Sketch/Dataflow/Panel) preserves GraphState
  - GraphState provided at App level, not inside editor component
  - Switching modes doesn't destroy GraphState
- Keyboard shortcuts scope correctly:
  - Delete: removes selected in Dataflow mode only
  - Space: play/pause in Dataflow mode only
- trunk build --release succeeds
- All existing 188+ combined-frontend tests pass
"""
deps = ["task-007"]
status = "pending"
