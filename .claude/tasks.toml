# ============================================================================

[[tasks]]
id = "task-010"
title = "2D sketch editor with constraint solver"
acceptance = """
- New src/components/sketch/mod.rs with sub-components:
- Drawing canvas:
  - HTML5 <canvas> with coordinate transform (pan, zoom, grid)
  - Grid snapping (configurable grid size)
  - Tool selector: Line, Rectangle, Circle, Polyline
