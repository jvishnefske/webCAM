version = 1
status = "in_progress"

[project]
name = "mvp-model-based-dev"
description = "MVP model-based development: simulate in-browser with play/pause/step, monitor live pubsub values, visual wiring with auto-topics"

# ============================================================================
# Phase 1: Simulation engine (foundation for everything else)
# ============================================================================

[[tasks]]
id = "task-001"
title = "Add tick counter and pubsub persistence to in-browser DAG evaluation"
acceptance = """
- dag-core eval gains a SimState struct: tick_count (u64), pubsub_store (HashMap<String, f64>)
- SimState::tick(dag, values) evaluates once, stores Publish outputs in pubsub_store,
  feeds them back as Subscribe inputs on next tick
- SimState::reset() clears tick_count and pubsub_store
- tick_count increments on each tick
- 5+ tests: multi-tick pubsub persistence, reset clears state, tick_count increments
"""
deps = []
status = "complete"

[[tasks]]
id = "task-002"
title = "Add transport controls to combined-frontend DAG editor"
acceptance = """
- Play button: starts a setInterval/gloo_timers loop that calls SimState::tick at configurable dt
- Pause button: stops the loop
- Step button: single tick
- Reset button: calls SimState::reset, clears eval_results
- dt and speed controls (input fields)
- Tick counter displayed in status bar
- All controls use the SimState from task-001
- Builds with trunk build --release
"""
deps = ["task-001"]
status = "pending"

[[tasks]]
id = "task-003"
title = "Add live pubsub monitor panel to DAG editor"
acceptance = """
- New panel below canvas showing all pubsub topics and current values
- Updates on every tick (driven by SimState, not polling HTTP)
- Shows topic name, current value (4 decimal places), direction (pub/sub)
- Collapsible panel with header showing topic count
- Topics sorted alphabetically
- Builds with trunk build --release
"""
deps = ["task-002"]
status = "pending"

# ============================================================================
# Phase 2: Visual wiring (parallel with monitoring)
# ============================================================================

[[tasks]]
id = "task-004"
title = "Add SVG edge rendering between connected blocks"
acceptance = """
- PlacedBlock gains a connections: Vec<(usize, usize, usize)> field (from_id, from_port, to_id, to_port — stored as from_block, to_block, to_port)
- SVG <line> or <path> elements drawn between output port circles and input port circles
- Edges update when blocks are repositioned (reactive via signals)
- Edge color matches port type
- Builds with trunk build --release
"""
deps = []
status = "pending"

[[tasks]]
id = "task-005"
title = "Add drag-to-connect wiring with auto-topic generation"
acceptance = """
- Mousedown on output port starts wire drag (dashed SVG line follows cursor)
- Mouseup on input port completes connection:
  - Generates auto-topic name (e.g. "wire_3_0" from source block id + port)
  - Sets output block's publish topic to the auto-topic
  - Sets input block's subscribe topic to the auto-topic
  - Adds edge to connections list
- Mouseup on empty canvas cancels wire
- Delete key on selected edge removes it and clears auto-topics
- 3+ tests for auto-topic generation logic
"""
deps = ["task-004"]
status = "pending"
