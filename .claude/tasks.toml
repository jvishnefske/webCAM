version = 1
status = "complete"

[project]
name = "leptos-frontend-rewrite"
description = "Reimplement all TypeScript frontend (www/) in Leptos combined-frontend (hil/combined-frontend/)"
worktree_base = ".worktrees"

# ============================================================================
# Phase 0: Foundation — crate wiring, theme, app shell
# ============================================================================

[[tasks]]
id = "task-001"
title = "Add graph-model and codegen crate dependencies to combined-frontend"
acceptance = """
- Cargo.toml gains: graph-model, block-registry (no tsify feature), codegen-emit, target-registry, deployment
- A new src/graph_engine.rs module wraps graph lifecycle:
  - GraphEngine::new(dt) creates engine with empty block/channel state
  - add_block(block_type, config_json) -> BlockId using block-registry create_block
  - remove_block(id), update_block(id, block_type, config_json)
  - connect(from_block, from_port, to_block, to_port) -> ChannelId
  - disconnect(channel_id)
  - tick(dt) evaluates all blocks in topological order via Module::as_tick()
  - snapshot() -> graph_model::GraphSnapshot
  - block_types() -> Vec<BlockTypeInfo> from block-registry
  - function_defs() -> Vec<FunctionDef> from configurable-blocks registry
- Existing editor.rs PlacedBlock/SimState code migrated to use GraphEngine
- 5+ unit tests: add/remove block, connect/disconnect, tick produces output values, snapshot round-trip
- trunk build --release succeeds
- cargo clippy --target wasm32-unknown-unknown -p combined-frontend -- -D warnings clean
"""
deps = []
status = "complete"

[[tasks]]
id = "task-002"
title = "Theme module and 4-mode app shell with responsive layout"
acceptance = """
- New src/theme.rs with const color tokens, font stacks, spacing values matching www/src/theme.ts
  - Port type colors (Float=cyan, Bytes=amber, Text=green, Series=violet, Any=gray)
  - Wire colors, surface/bg/border/accent colors (dark theme)
  - Spacing constants (sidebar width, header height, port radius, node dimensions)
  - portColor(kind) -> &str function
- App shell restructured: top-level mode switcher (CAM, Sketch, Dataflow, Panel)
  - Dataflow mode contains existing HIL sub-tabs (Buses, Telemetry, Console, Firmware, Deploy)
  - Each mode shows/hides its content area reactively
  - Active mode persisted in signal, highlighted in nav
- Responsive layout: sidebar + main content + optional right pane
- All existing components continue to render correctly within Dataflow mode
- trunk build --release succeeds
"""
deps = []
status = "complete"

# ============================================================================
# Phase 1: Dataflow editor completion
# ============================================================================

[[tasks]]
id = "task-003"
title = "Project persistence with sidebar and auto-save"
acceptance = """
- New src/components/dag/storage.rs:
  - save_project(name, GraphSnapshot, positions, viewport) to LocalStorage as JSON
  - load_project(name) -> (GraphSnapshot, positions, viewport)
  - list_projects() -> Vec<(name, last_modified)>
  - delete_project(name)
  - Auto-save on graph mutations with 2-second debounce
- New src/components/dag/sidebar.rs:
  - Project list with last-modified timestamps (human-readable "2m ago")
  - Click to load, delete button per project
  - "New Project" button that clears graph
  - Active project name displayed in header
- Project name editable (inline text input)
- 3+ tests: save/load round-trip, list ordering, delete removes entry
- trunk build --release succeeds
"""
deps = ["task-001"]
status = "complete"

[[tasks]]
id = "task-004"
title = "Transport controls and simulation engine using GraphEngine"
acceptance = """
- Transport bar component with Play/Pause, Step, Reset buttons
- Play starts a gloo_timers interval calling GraphEngine::tick(dt) at configurable rate
- Pause stops the interval
- Step calls tick once
- Reset clears graph state and tick counter
- Speed multiplier input (0.25x, 0.5x, 1x, 2x, 4x)
- dt input field (default 0.01)
- Batch run: input steps count + "Run" button, calls tick N times synchronously
- Tick count and simulation time displayed in status bar
- Snapshot signal updates on every tick, driving reactive UI updates
- trunk build --release succeeds
"""
deps = ["task-001"]
status = "complete"

[[tasks]]
id = "task-005"
title = "Canvas-based Series plot component"
acceptance = """
- New src/components/dag/plot.rs Leptos component
- Renders on HTML5 <canvas> element via web-sys CanvasRenderingContext2d
- Accepts Vec<f64> series data from block output values of kind Series
- Scrolling history buffer (last 200 samples)
- Auto-scaling Y axis with min/max labels
- Grid lines and axis labels
- Multiple series overlay with distinct colors
- Updates reactively on each simulation tick
- Displayed in right-pane "Plot" tab within Dataflow mode
- trunk build --release succeeds
"""
deps = ["task-004"]
status = "complete"

[[tasks]]
id = "task-006"
title = "State machine editor component"
acceptance = """
- New src/components/dag/state_machine_editor.rs
- Opened when a state_machine block is selected
- State management: add/remove/rename states, set initial state
- Transition editor: add/remove transitions with from/to state selection
- Guard conditions: Topic-based (topic + field conditions), Unconditional, GuardPort
- Field conditions: field name, operator (Eq/Ne/Gt/Lt/Ge/Le), value
- Actions: topic + message payload per transition
- Input/output topic bindings list (add/remove)
- Emits StateMachineConfig JSON that updates the block config via GraphEngine
- Visual state list with transitions shown per-state
- trunk build --release succeeds
"""
deps = ["task-001"]
status = "complete"

[[tasks]]
id = "task-007"
title = "Multi-board management and codegen export with ZIP download"
acceptance = """
- Board manager component:
  - Add/remove boards (name + MCU family dropdown from target-registry)
  - Board list with delete buttons
  - Per-block target assignment dropdown (which board runs this block)
- Target checkboxes: Host, RP2040, STM32F4, STM32G0B1, ESP32-C3
- MCU pin table component (reuse existing pin_table concept):
  - Shows PinDef list for selected MCU family
  - Pin name, port, number, alternate functions, ADC channel
- Single-target export: calls codegen-emit to generate Rust crate, displays file listing
- Multi-target export: generates workspace with per-board crates + pubsub bridges
- ZIP download: constructs zip archive in-browser (CBOR or raw bytes), triggers download
- File preview: collapsible <details> per file showing generated code with line counts
- trunk build --release succeeds
"""
deps = ["task-001", "task-004"]
status = "complete"

