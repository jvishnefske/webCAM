- Simulation playback component:
  - Loads SimMove array from rustcam sim_moves_stl/sim_moves_svg
  - Play/Pause/Reset controls
  - Animated cursor showing current tool position
  - Material removal visualization (progressive line drawing)
  - Speed control slider
- Preview updates on file load or config change
- Displayed in right pane tabs within CAM mode
- trunk build --release succeeds
"""
deps = ["task-008"]
status = "complete"

# ============================================================================
