name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - uses: jetli/trunk-action@v0.5.0
        with:
          version: latest
      - run: cargo install cargo-llvm-cov --locked
      - run: make lint
      - run: make test
      - name: Clippy (combined-frontend, wasm32)
        run: cargo clippy -p combined-frontend --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: Sanity build (combined-frontend)
        working-directory: hil/combined-frontend
        run: trunk build --release

  deploy-external:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-external
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deploy-
      - uses: jetli/trunk-action@v0.5.0
        with:
          version: latest
      - name: Build combined-frontend for /cam/
        working-directory: hil/combined-frontend
        run: trunk build --release --public-url /cam/
      - name: Write version.json
        run: |
          echo '{"sha":"'"${GITHUB_SHA::8}"'","date":"'"$(date -u +%FT%TZ)"'","ref":"'"$GITHUB_REF_NAME"'"}' \
            > hil/combined-frontend/dist/version.json
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.CAM_DEPLOY_KEY }}
          external_repository: jvishnefske/cam
          publish_dir: ./hil/combined-frontend/dist
          publish_branch: gh-pages
          keep_files: true

  deploy-preview:
    needs: build
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      (needs.build.result == 'success' || github.event.action == 'closed')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
        if: github.event.action != 'closed'
      - uses: dtolnay/rust-toolchain@stable
        if: github.event.action != 'closed'
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        if: github.event.action != 'closed'
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-preview-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-preview-
      - uses: jetli/trunk-action@v0.5.0
        if: github.event.action != 'closed'
        with:
          version: latest
      - name: Build combined-frontend for PR preview
        if: github.event.action != 'closed'
        working-directory: hil/combined-frontend
        run: trunk build --release --public-url /cam/pr-preview/pr-${{ github.event.pull_request.number }}/
      - uses: peaceiris/actions-gh-pages@v4
        if: github.event.action != 'closed'
        with:
          deploy_key: ${{ secrets.CAM_DEPLOY_KEY }}
          external_repository: jvishnefske/cam
          publish_dir: ./hil/combined-frontend/dist
          publish_branch: gh-pages
          destination_dir: pr-preview/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - uses: actions/github-script@v8
        if: github.event.action != 'closed'
        with:
          script: |
            const marker = '<!-- pr-preview -->';
            const url = `https://jvishnefske.github.io/cam/pr-preview/pr-${context.issue.number}/`;
            const body = `${marker}\n**Preview:** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number, body
              });
            }

      - name: Remove preview
        if: github.event.action == 'closed'
        env:
          DEPLOY_KEY: ${{ secrets.CAM_DEPLOY_KEY }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          PR=${{ github.event.pull_request.number }}
          mkdir -p ~/.ssh && echo "$DEPLOY_KEY" > ~/.ssh/key && chmod 600 ~/.ssh/key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/key -o StrictHostKeyChecking=no"
          git clone --branch gh-pages --depth 1 git@github.com:jvishnefske/cam.git _cam
          cd _cam
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "pr-preview/pr-$PR" ]; then
            git rm -rf "pr-preview/pr-$PR"
            git commit -m "Remove preview for PR #$PR"
            git push
          fi

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-
      - uses: jetli/trunk-action@v0.5.0
        with:
          version: latest
      - name: Build release artifact
        working-directory: hil/combined-frontend
        run: trunk build --release
      - name: Zip dist
        run: cd hil/combined-frontend/dist && zip -r ../../../rustcam-combined.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: rustcam-combined.zip
          generate_release_notes: true
