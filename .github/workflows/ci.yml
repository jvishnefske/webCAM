name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: cargo test --all
      - run: wasm-pack build --target web --out-dir www/pkg --release
      - run: cd www && zip -r ../rustcam.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: rustcam
          path: rustcam.zip
      - uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: rustcam.zip
          generate_release_notes: true

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

  deploy-external:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-external
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: wasm-pack build --target web --out-dir www/pkg --release
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.CAM_DEPLOY_KEY }}
          external_repository: jvishnefske/cam
          publish_dir: ./www
          publish_branch: gh-pages
          keep_files: true

  deploy-preview:
    needs: build
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      (needs.build.result == 'success' || github.event.action == 'closed')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        if: github.event.action != 'closed'
        with:
          name: rustcam
      - run: mkdir -p www && cd www && unzip -o ../rustcam.zip
        if: github.event.action != 'closed'

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: www
          deploy-repository: jvishnefske/cam
          deploy-key: ${{ secrets.CAM_DEPLOY_KEY }}
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
