name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: cargo install cargo-llvm-cov --locked
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: make lint
      - run: make test
      - run: make wasm
      - run: make ts
      - run: |
          echo '{"sha":"'"${GITHUB_SHA::8}"'","date":"'"$(date -u +%FT%TZ)"'","ref":"'"$GITHUB_REF_NAME"'"}' > www/version.json
      - name: Remove build-only files from www
        run: rm -rf www/node_modules www/src www/package.json www/package-lock.json www/tsconfig.json www/vitest.config.ts www/esbuild.config.mjs
      - run: cd www && zip -r ../rustcam.zip .
      - uses: actions/upload-artifact@v5
        with:
          name: rustcam
          path: rustcam.zip
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: rustcam.zip
          generate_release_notes: true

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-pages
      cancel-in-progress: true
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: rustcam
      - run: unzip -o rustcam.zip -d site
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  deploy-external:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-external
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: make wasm ts
      - run: |
          echo '{"sha":"'"${GITHUB_SHA::8}"'","date":"'"$(date -u +%FT%TZ)"'","ref":"'"$GITHUB_REF_NAME"'"}' > www/version.json
      - name: Remove build-only files
        run: rm -rf www-cam/node_modules www-dataflow/node_modules www/node_modules
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.CAM_DEPLOY_KEY }}
          external_repository: jvishnefske/cam
          publish_dir: ./www
          publish_branch: gh-pages
          keep_files: true

  deploy-preview:
    needs: build
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      (needs.build.result == 'success' || github.event.action == 'closed')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        if: github.event.action != 'closed'
        with:
          name: rustcam
      - run: mkdir -p www && cd www && unzip -o ../rustcam.zip
        if: github.event.action != 'closed'

      - uses: peaceiris/actions-gh-pages@v4
        if: github.event.action != 'closed'
        with:
          deploy_key: ${{ secrets.CAM_DEPLOY_KEY }}
          external_repository: jvishnefske/cam
          publish_dir: ./www
          publish_branch: gh-pages
          destination_dir: pr-preview/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - uses: actions/github-script@v8
        if: github.event.action != 'closed'
        with:
          script: |
            const marker = '<!-- pr-preview -->';
            const url = `https://jvishnefske.github.io/cam/pr-preview/pr-${context.issue.number}/`;
            const body = `${marker}\n**Preview:** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number, body
              });
            }

      - name: Remove preview
        if: github.event.action == 'closed'
        env:
          DEPLOY_KEY: ${{ secrets.CAM_DEPLOY_KEY }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          PR=${{ github.event.pull_request.number }}
          mkdir -p ~/.ssh && echo "$DEPLOY_KEY" > ~/.ssh/key && chmod 600 ~/.ssh/key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/key -o StrictHostKeyChecking=no"
          git clone --branch gh-pages --depth 1 git@github.com:jvishnefske/cam.git _cam
          cd _cam
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "pr-preview/pr-$PR" ]; then
            git rm -rf "pr-preview/pr-$PR"
            git commit -m "Remove preview for PR #$PR"
            git push
          fi
